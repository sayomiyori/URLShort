worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    access_log /var/log/nginx/access.log;

    proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=url_cache:10m max_size=100m inactive=60m use_temp_path=off;

    limit_req_zone $binary_remote_addr zone=api:10m rate=50r/m;

    upstream fastapi {
        server app:8012;
    }

    server {
        listen 80;
        server_name _;

        location /api {
            limit_req zone=api burst=20 nodelay;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://fastapi;
        }

        location = /metrics {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://fastapi;
        }

        location ~ ^/(docs|redoc|openapi\.json|favicon\.ico)$ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://fastapi;
        }

        location ~ ^/[A-Za-z0-9_-]+$ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass http://fastapi;
            proxy_cache url_cache;
            proxy_cache_valid 301 10m;
            proxy_cache_key "$request_uri";
            add_header X-Cache-Status $upstream_cache_status always;
        }
    }
}
